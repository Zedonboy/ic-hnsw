name: Build and Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:

          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release
        env:
          RUSTFLAGS: "--allow warnings"

      - name: Generate Candid
        run: |
          cargo install candid-extractor
          candid-extractor target/wasm32-unknown-unknown/release/ic_hnsw.wasm > ic_hnsw.did

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/wasm32-unknown-unknown/release/ic_hnsw.wasm release/
          cp ic_hnsw.did release/
          cd release
          sha256sum ic_hnsw.wasm > ic_hnsw.wasm.sha256

      - name: Generate tag
        id: generate_tag
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag }}
          name: Release ${{ steps.generate_tag.outputs.tag }}
          files: |
            release/ic_hnsw.wasm
            release/ic_hnsw.did
            release/ic_hnsw.wasm.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}